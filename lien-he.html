<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lịch Chăm Sóc Thú Cưng</title>
    <link rel="stylesheet" href="lien-he.css">
</head>
<body>

<div class="form-container" id="loginOverlay">
    <h2>Thông tin liên hệ</h2>
    
    <form id="contactForm" novalidate>
        <div class="section-header">👤 1. Thông tin chủ nuôi</div>
        <div class="form-group">
            <label>Họ và tên: <span class="required">*</span></label>
            <input type="text" id="fullname">
            <span class="error-msg" id="nameError">Mục này là bắt buộc.</span>
        </div>

        <div class="form-group">
            <label>Số điện thoại: <span class="required">*</span></label>
            <input type="tel" id="phone" placeholder="Phải đủ 10 số">
            <span class="error-msg" id="phoneError">Số điện thoại phải đủ 10 số.</span>
        </div>

        <div class="form-group">
            <label>Email: (Không bắt buộc)</label>
            <input type="email" id="email">
            <span class="error-msg" id="emailError">Định dạng email chưa đúng.</span>
        </div>

        <div class="form-group">
            <label>Địa chỉ:</label>
            <input type="text">
        </div>

        <div class="section-header">🐾 2. Thông tin thú cưng</div>
        <div class="form-row">
            <div class="form-group">
                <label>Loại thú cưng:</label>
                <select name="pet_type">
                    <option value="cho">Chó</option>
                    <option value="meo">Mèo</option>
                </select>
            </div>
            <div class="form-group">
                <label>Giống:</label>
                <input type="text" placeholder="Poodle...">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Cân nặng (kg):</label>
                <input type="number" name="weight" placeholder="5">
            </div>
            <div class="form-group">
                <label>Tuổi:</label>
                <input type="text" name="age">
            </div>
        </div>

        <div class="section-header">✂️ 3. Dịch vụ</div>
        <div class="checkbox-container">
            <label class="check-item"><input type="checkbox" name="service" value="tam"> Tắm</label>
            <label class="check-item"><input type="checkbox" name="service" value="cat_tia"> Cắt / tỉa lông</label>
            <label class="check-item"><input type="checkbox" name="service" value="cat_mong"> Cắt móng</label>
            <label class="check-item"><input type="checkbox" name="service" value="ve_sinh"> Vệ sinh tai/răng</label>
            <label class="check-item"><input type="checkbox" name="service" value="spa"> Spa thú cưng</label>
            <label class="check-item"><input type="checkbox" name="service" value="kham"> Khám cơ bản</label>
            <label class="check-item"><input type="checkbox" name="service" value="dua_don"> Đưa đón</label>
            <label class="check-item"><input type="checkbox" name="service" value="mua_sam"> Mua thức ăn</label>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Ngày đặt lịch:</label>
                <input type="date">
            </div>
            <div class="form-group">
                <label>Khung giờ:</label>
                <select>
                    <option>Sáng</option>
                    <option>Chiều</option>
                    <option>Tối</option>
                </select>
            </div>
        </div>

        <div class="section-header">📝 5. Ghi chú</div>
        <div class="form-group">
            <label>Yêu cầu thêm / Tình trạng:</label>
            <textarea rows="3"></textarea>
        </div>

        <div class="agreement">
            <input type="checkbox" id="agree">
            <label for="agree">Tôi đồng ý điều khoản</label>
        </div>
        <span class="error-msg" id="agreeError">Bạn cần đồng ý.</span>

        <button type="submit">GỬI ĐI</button>
    </form>
</div>

<script src="lien-he.js"></script>
</body>
</html>
