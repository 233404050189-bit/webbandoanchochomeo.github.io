<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Pet Mall</title>
    <link rel="stylesheet" href="dangky.css">
</head>
<body>
    <div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo-circle">
            <img src="images/paw-icon.png" alt="Pet Mall">
        </div>

        <h1>Đăng ký mới</h1>
        <p class="sub-text">Tạo tài khoản để nhận ưu đãi từ Pet Mall</p>

        <form class="auth-form">
            <div class="input-field">
                <input type="text" placeholder="Họ và tên của bạn" required>
            </div>
            
            <div class="input-field">
                <input type="email" placeholder="Email của bạn" required>
            </div>

            <div class="input-field">
                <input type="password" placeholder="Mật khẩu (Tối thiểu 6 ký tự)" required minlength="6">
            </div>

            <div class="input-field">
                <input type="password" placeholder="Xác nhận lại mật khẩu" required>
            </div>
            
            <button type="submit" class="btn-main">Đăng ký ngay</button>
        </form>

        <div class="auth-links">
            <a href="dang-nhap.html">Đã có tài khoản? • Đăng nhập ngay</a>
        </div>
    </div>
</div>
</body>
</html>
